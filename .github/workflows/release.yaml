# Triggered on version tags (e.g. v1.2.3).
# - Runs tests
# - Builds multi-arch Docker image pushed to GHCR with version tags
# - Packages the Helm chart
# - Creates a GitHub release with the Helm .tgz attached and a changelog
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: clouddrove/pod-resource-scanner

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── 2. Helm lint + package ──────────────────────────────────────────────────
  helm-package:
    name: Lint and package Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint chart
        run: helm lint ./chart

      - name: Package chart
        run: |
          # Strip leading "v" from the tag (e.g. v1.2.3 → 1.2.3)
          VERSION="${GITHUB_REF_NAME#v}"
          helm package ./chart --version "$VERSION" --app-version "$VERSION"

      - uses: actions/upload-artifact@v7
        with:
          name: helm-chart
          path: "*.tgz"
          retention-days: 7

  # ── 3. Docker build + push ──────────────────────────────────────────────────
  docker-release:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
      id-token: write   # for provenance attestation

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=min

  # ── 4. GitHub release ───────────────────────────────────────────────────────
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [docker-release, helm-package]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty="- %s" "${PREV_TAG}..HEAD")
          else
            CHANGES=$(git log --pretty="- %s" HEAD)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          tag_name: "${{ github.ref_name }}"
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changes }}

            ## Docker image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ## Helm chart

            ```bash
            helm upgrade --install pod-resource-scanner \
              oci://${{ env.REGISTRY }}/clouddrove/charts/pod-resource-scanner \
              --version ${{ github.ref_name }}
            ```

            Or install from the attached `.tgz`:

            ```bash
            helm upgrade --install pod-resource-scanner ./pod-resource-scanner-*.tgz
            ```
          files: "*.tgz"
          fail_on_unmatched_files: true
